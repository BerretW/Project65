# appartus_os.cfg - AppartusOS linker configuration
#
# Memory map:
#   ZP   $0000-$00FF  Zero page (cc65 + OS vars $40-$4E)
#   RAM  $0200-$5FFF  Working RAM; HW stack at $01FF, cc65 sw-stack grows down from $5FFF
#   ROM  $E000-$FFFF  EEPROM 8 KB (fill $FF)
#   JMPTBL fixed at $FF00 (base entries + OS extensions)
#   VECTORS at $FFFA (NMI / RESET / IRQ)
#
# The RAMDisk ($6000-$7FFF) is managed at runtime; linker does NOT
# map anything there so the OS can freely use it as data storage.
#
# High RAM ($8000-$BFFF) is not mapped here either – programs may
# use it as a load/run area.

MEMORY
{
    ZP:      start = $0000, size = $0100, type = rw, define = yes;
    RAM:     start = $0200, size = $5E00, type = rw, define = yes;
    ROM:     start = $E000, size = $2000, fill = yes, fillval = $FF;
}

SEGMENTS
{
    ZEROPAGE: load = ZP,  type = zp,  define   = yes;
    DATA:     load = ROM, type = rw,  define   = yes, run = RAM, offset = $200;
    BSS:      load = RAM, type = bss, define   = yes;
    HEAP:     load = RAM, type = bss, optional = yes;
    STARTUP:  load = ROM, type = ro;
    ONCE:     load = ROM, type = ro,  optional = yes;
    CODE:     load = ROM, type = ro;
    RODATA:   load = ROM, type = ro;
    JMPTBL:   load = ROM, type = ro,  start    = $FF00;
    VECTORS:  load = ROM, type = ro,  start    = $FFFA;
}

FEATURES
{
    CONDES: segment = STARTUP,
            type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__;
    CONDES: segment = STARTUP,
            type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__;
}

SYMBOLS
{
    __STACKSIZE__:  value = $0200, type = weak;
    __STACKSTART__: value = $5FFF, type = weak;
}
