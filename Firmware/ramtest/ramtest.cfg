# ramtest.cfg – linker konfigurace pro RAM test program
#
# Binárka musí mít přesně 8192 bajtů ($2000):
#   $6000–$7FFB  kód + data (filled $FF)
#   $7FFC–$7FFF  RAMDISK_RESET_VECTOR (lo/hi start adresy)
#
# Bootloader (write_to_RAM) načte přesně 8192 B na $6000 a poté
# skočí na adresu uloženou na $7FFC.

MEMORY
{
    RAM:    start = $6000, size = $1FFC, fill = yes, fillval = $FF;
    RAMVEC: start = $7FFC, size = $0004, fill = yes, fillval = $00;
}

SEGMENTS
{
    CODE:   load = RAM,    type = ro;
    RODATA: load = RAM,    type = ro;
    RAMVEC: load = RAMVEC, type = ro;
}
