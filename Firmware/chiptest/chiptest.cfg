# chiptest.cfg - linker konfigurace pro chip test program
#
# Binarka musi mit presne 8192 bajtu ($2000):
#   $6000-$7FFB  kod + data (filled $FF)
#   $7FFC-$7FFF  RAMDISK_RESET_VECTOR (lo/hi start adresy)
#
# Bootloader (write_to_RAM) nacte presne 8192 B na $6000 a pote
# skoci na adresu ulozenou na $7FFC.

MEMORY
{
    RAM:    start = $6000, size = $1FFC, fill = yes, fillval = $FF;
    RAMVEC: start = $7FFC, size = $0004, fill = yes, fillval = $00;
}

SEGMENTS
{
    CODE:   load = RAM,    type = ro;
    RODATA: load = RAM,    type = ro;
    RAMVEC: load = RAMVEC, type = ro;
}
